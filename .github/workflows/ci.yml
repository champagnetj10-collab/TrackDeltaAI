name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trackdelta
          POSTGRES_PASSWORD: trackdelta
          POSTGRES_DB: trackdelta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://trackdelta:trackdelta@localhost:5432/trackdelta_test
      REDIS_URL: redis://localhost:6379/0
      # Stub values — tests should mock external services
      SUPABASE_URL: https://stub.supabase.co
      SUPABASE_ANON_KEY: stub-anon-key
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
      SUPABASE_JWT_SECRET: stub-jwt-secret-32-chars-minimum-x
      ANTHROPIC_API_KEY: stub-anthropic-key
      STRIPE_SECRET_KEY: stub-stripe-key
      STRIPE_WEBHOOK_SECRET: stub-webhook-secret
      RESEND_API_KEY: stub-resend-key
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint — ruff
        run: ruff check .

      - name: Type check — mypy
        run: mypy app/ pipeline/
        continue-on-error: true   # tracked separately; not yet a hard gate

      - name: Bootstrap Supabase auth schema stub
        # Migration 002 references auth.uid(), which only exists on Supabase's
        # hosted Postgres. Stub it here so the migration's SQL is actually
        # exercised in CI instead of skipped — the real value it returns
        # doesn't matter since the backend connects as the table-owning role
        # and bypasses RLS entirely (see 002_row_level_security.py docstring).
        run: |
          PGPASSWORD=trackdelta psql -h localhost -U trackdelta -d trackdelta_test -c "
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS 'SELECT NULL::uuid';
          "

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v --tb=short

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint + type-check + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — eslint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_stub
